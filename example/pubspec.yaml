publish_to: none

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  jaspr: ^0.22.4
  jaspr_icons_pack:
    path: ../

dev_dependencies:
  build_runner: ^2.6.0
  build_web_compilers: ^4.2.4
  jaspr_builder: ^0.22.3
  jaspr_lints: ^0.6.0
  lints: ^5.0.0

jaspr:
  mode: static
